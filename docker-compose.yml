services:
  backend:
    image: frayscc/readbox:backend-0.5.1
    container_name: readbox-backend
    environment:
      READBOX_USERNAME: ${READBOX_USERNAME:-readbox}
      READBOX_PASSWORD: ${READBOX_PASSWORD:?set READBOX_PASSWORD in .env}
      READBOX_SESSION_SECRET: ${READBOX_SESSION_SECRET:?set READBOX_SESSION_SECRET in .env}
      DATABASE_URL: sqlite:////data/readbox.db
      CORS_ORIGINS: ${CORS_ORIGINS:-https://readbox.example.com}
    volumes:
      - ./data:/data
    networks:
      - npm
    restart: unless-stopped

  web:
    image: frayscc/readbox:web-0.5.1
    container_name: readbox-web
    depends_on:
      - backend
    networks:
      - npm
    restart: unless-stopped

networks:
  npm:
    external: true
    name: npm
