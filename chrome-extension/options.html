<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadBox 设置</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="options">
      <form id="settingsForm" class="panel">
        <h1>ReadBox 设置</h1>

        <label>
          API Base URL
          <input id="apiBaseUrl" type="url" placeholder="http://localhost:8000" required />
        </label>

        <label>
          API Token
          <input id="apiToken" type="password" required />
        </label>

        <button type="submit">保存设置</button>
        <div id="status" class="status" role="status"></div>
      </form>
    </main>

    <script src="readbox.js"></script>
    <script src="options.js"></script>
  </body>
</html>
