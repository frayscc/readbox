<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadBox 设置</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options-body">
    <main class="options">
      <form id="settingsForm" class="options-panel">
        <div class="options-title">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 4.5h7.4L18 8.1v11.4H7V4.5Z" stroke="currentColor" stroke-width="1.8" />
              <path d="M14 4.5v4h4" stroke="currentColor" stroke-width="1.8" />
            </svg>
          </span>
          <div>
            <h1>ReadBox Options</h1>
            <p>Chrome 扩展只保存服务地址和令牌，不存储文章正文。</p>
          </div>
        </div>

        <label>
          API Base URL
          <input id="apiBaseUrl" type="url" placeholder="https://readbox.example.com" required />
        </label>

        <label>
          API Token
          <input id="apiToken" type="password" required />
        </label>

        <div class="options-actions">
          <button class="save" type="submit">保存配置</button>
        </div>
        <div id="status" class="status" role="status"></div>
      </form>
    </main>

    <script src="readbox.js"></script>
    <script src="options.js"></script>
  </body>
</html>
