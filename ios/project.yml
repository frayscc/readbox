name: ReadBox
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.5.1
    CURRENT_PROJECT_VERSION: 1
targets:
  ReadBox:
    type: application
    platform: iOS
    sources:
      - path: ReadBox
      - path: Shared
    info:
      path: ReadBox/Info.plist
      properties:
        CFBundleDisplayName: ReadBox
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchStoryboardName: LaunchScreen
    entitlements:
      path: ReadBox/ReadBox.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.readbox
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: ReadBoxShareExtension
        embed: true

  ReadBoxShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ReadBoxShareExtension
      - path: Shared
    info:
      path: ReadBoxShareExtension/Info.plist
      properties:
        CFBundleDisplayName: ReadBox Share
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: ReadBoxShareExtension/ReadBoxShareExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.readbox.share
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: true
